<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Referências</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap');

  :root {
    --wood-dark: #2C1F0E;
    --wood-mid: #5C3D1E;
    --wood-light: #A0693A;
    --cream: #F5F0E8;
    --cream-dark: #EDE5D8;
    --gold: #C9A96E;
    --text: #1A1209;
    --muted: #8B7355;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'Jost', sans-serif;
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--wood-dark);
    padding: 18px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    border-bottom: 2px solid var(--gold);
  }

  .logo-area {
    display: flex;
    flex-direction: column;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 500;
    color: var(--cream);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .brand-tagline {
    font-size: 10px;
    font-weight: 300;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .header-counter {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--gold);
    font-weight: 300;
  }

  .header-counter span {
    font-size: 14px;
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    margin-left: 4px;
  }

  /* ─── CATEGORY FILTER ─── */
  .filter-bar {
    background: var(--cream-dark);
    padding: 10px 40px;
    display: flex;
    gap: 8px;
    align-items: center;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    overflow-x: auto;
  }

  .filter-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    white-space: nowrap;
    margin-right: 4px;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--wood-light);
    color: var(--wood-mid);
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: var(--wood-dark);
    border-color: var(--wood-dark);
    color: var(--cream);
  }

  /* ─── MAIN VIEWER ─── */
  .viewer {
    flex: 1;
    display: flex;
    align-items: stretch;
    overflow: hidden;
    position: relative;
  }

  /* NAV ARROWS */
  .nav-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: var(--wood-dark);
    border: none;
    color: var(--gold);
    width: 52px;
    height: 52px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    opacity: 0.85;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }

  .nav-btn:hover { opacity: 1; transform: translateY(-50%) scale(1.05); }
  .nav-btn:disabled { opacity: 0.2; cursor: default; }
  .nav-btn.prev { left: 20px; }
  .nav-btn.next { right: 20px; }

  .nav-btn svg { width: 20px; height: 20px; }

  /* IMAGE DISPLAY */
  .image-stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 90px;
    position: relative;
    overflow: hidden;
  }

  .slide {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
    height: 100%;
    animation: fadeIn 0.35s ease;
  }

  .slide.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .img-frame {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 4px;
    background: var(--cream-dark);
    box-shadow: 0 8px 40px rgba(44,31,14,0.12);
    border: 1px solid rgba(0,0,0,0.06);
  }

  .img-frame img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    display: block;
  }

  .img-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: var(--muted);
  }

  .img-placeholder svg { opacity: 0.4; }

  .img-placeholder p {
    font-size: 13px;
    letter-spacing: 1px;
    opacity: 0.7;
  }

  .slide-info {
    margin-top: 14px;
    text-align: center;
    flex-shrink: 0;
  }

  .slide-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: var(--wood-dark);
  }

  .slide-category {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--gold);
    margin-top: 3px;
  }

  .slide-desc {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    max-width: 400px;
  }

  /* ─── THUMBNAIL STRIP ─── */
  .thumb-strip {
    background: var(--cream-dark);
    border-top: 1px solid rgba(0,0,0,0.08);
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: thin;
    scrollbar-color: var(--gold) transparent;
    justify-content: safe center;
  }

  .thumb {
    width: 64px;
    height: 64px;
    border-radius: 4px;
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
    border: 2px solid transparent;
    transition: all 0.2s;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .thumb:hover { border-color: var(--wood-light); }

  .thumb.active {
    border-color: var(--gold);
    box-shadow: 0 0 0 2px var(--gold);
  }

  .thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .thumb-placeholder {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    padding: 4px;
    line-height: 1.3;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    padding: 40px;
    text-align: center;
  }

  .empty-state .icon { font-size: 48px; opacity: 0.4; }

  .empty-state h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    color: var(--wood-dark);
  }

  .empty-state p { font-size: 13px; max-width: 380px; line-height: 1.7; }

  .empty-state code {
    background: var(--cream-dark);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--wood-mid);
    font-family: monospace;
    border: 1px solid rgba(0,0,0,0.1);
  }

  /* ─── KEYBOARD HINT ─── */
  .kbd-hint {
    position: absolute;
    bottom: 16px;
    right: 20px;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1px;
    opacity: 0.6;
  }

  .kbd {
    display: inline-block;
    background: var(--cream-dark);
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
    font-family: monospace;
  }

  /* ─── SCROLLBAR ─── */
  .thumb-strip::-webkit-scrollbar { height: 4px; }
  .thumb-strip::-webkit-scrollbar-track { background: transparent; }
  .thumb-strip::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
</style>
</head>

    </svg>
  </button>

<div class="thumb-strip" id="thumbStrip"></div>

<script>
let current = 0;
let filtered = [];
let activeCategory = "Todos";

function init() {
  // Config
  document.getElementById('brandName').textContent = CONFIG.nomeMarcenaria.toUpperCase();
  document.getElementById('brandTagline').textContent = CONFIG.tagline;

  // Categorias únicas
  const cats = ["Todos", ...new Set(CATALOGO.map(i => i.category).filter(Boolean))];
  const filterBar = document.getElementById('filterBar');
  const label = filterBar.querySelector('.filter-label');
  filterBar.innerHTML = '';
  filterBar.appendChild(label);

  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (cat === 'Todos' ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => setCategory(cat, btn);
    filterBar.appendChild(btn);
  });

  setCategory('Todos', filterBar.querySelectorAll('.filter-btn')[0]);
}

function setCategory(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  filtered = cat === 'Todos' ? [...CATALOGO] : CATALOGO.filter(i => i.category === cat);
  current = 0;
  renderAll();
}

function encodeSrc(src) {
  if (!src) return src;
  return src.split('/').map((part, i) => i === 0 ? part : encodeURIComponent(part)).join('/');
}

function renderAll() {
  const stage = document.getElementById('imageStage');
  const strip = document.getElementById('thumbStrip');
  stage.innerHTML = '';
  strip.innerHTML = '';

  if (filtered.length === 0) {
    stage.innerHTML = `
      <div class="empty-state">
        <div class="icon">📂</div>
        <h2>Catálogo vazio</h2>
        <p>Adicione suas imagens no array <code>CATALOGO</code> no início do código HTML.<br>
        Cada item precisa de <code>title</code>, <code>category</code> e <code>src</code>.</p>
      </div>`;
    document.getElementById('currentNum').textContent = '0';
    document.getElementById('totalNum').textContent = '0';
    return;
  }

  filtered.forEach((item, i) => {
    const src = encodeSrc(item.src);
    // Slide principal
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="img-frame">
        ${item.src
          ? `<img src="${src}" alt="${item.title}" loading="lazy">`
          : `<div class="img-placeholder">
               <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                 <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
                 <polyline points="21 15 16 10 5 21"/>
               </svg>
               <p>${item.title}</p>
             </div>`
        }
      </div>
      <div class="slide-info">
        <div class="slide-title">${item.title}</div>
        <div class="slide-category">${item.category || ''}</div>
        ${item.desc ? `<div class="slide-desc">${item.desc}</div>` : ''}
      </div>`;
    stage.appendChild(slide);

    // Thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 0 ? ' active' : '');
    thumb.onclick = () => goTo(i);
    thumb.innerHTML = item.src
      ? `<img src="${src}" alt="${item.title}" loading="lazy">`
      : `<div class="thumb-placeholder">${item.title.substring(0,12)}</div>`;
    strip.appendChild(thumb);
  });

  updateCounter();
  updateNav();
}

function goTo(index) {
  const slides = document.querySelectorAll('.slide');
  const thumbs = document.querySelectorAll('.thumb');
  slides[current]?.classList.remove('active');
  thumbs[current]?.classList.remove('active');
  current = index;
  slides[current]?.classList.add('active');
  thumbs[current]?.classList.add('active');
  thumbs[current]?.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  updateCounter();
  updateNav();
}

function navigate(dir) {
  const next = current + dir;
  if (next >= 0 && next < filtered.length) goTo(next);
}

function updateCounter() {
  document.getElementById('currentNum').textContent = filtered.length ? current + 1 : 0;
  document.getElementById('totalNum').textContent = filtered.length;
}

function updateNav() {
  document.getElementById('btnPrev').disabled = current === 0;
  document.getElementById('btnNext').disabled = current === filtered.length - 1;
}

// Teclado
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }
});

// Touch / swipe
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const diff = touchX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 50) navigate(diff > 0 ? 1 : -1);
});

init();
</script>
</body>
</html>
